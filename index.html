<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Магазин</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .item {
            background-color: #fff;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }
        .item button:hover {
            background-color: #0056b3;
        }
        .cart {
            margin-top: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .cart h2 {
            margin: 0 0 10px 0;
            color: #333;
        }
        #usercard {
            margin-top: 10px;
            font-style: italic;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Магазин</h1>
    <div id="usercard"></div>
    <div id="items">
        <div class="item">
            Амарант (червоний) - 15 RUB
            <button id="btn1">Добавить</button>
        </div>
        <div class="item">
            Кокосовый субстрат 5 кг - 15 RUB
            <button id="btn2">Добавить</button>
        </div>
        <div class="item">
            Горох - 21 RUB
            <button id="btn3">Добавить</button>
        </div>
        <div class="item">
            Кинза - 50 RUB
            <button id="btn4">Добавить</button>
        </div>
        <div class="item">
            Редис (sango) - 18 RUB
            <button id="btn5">Добавить</button>
        </div>
        <div class="item">
            Рукола - 5 RUB
            <button id="btn6">Добавить</button>
        </div>
    </div>
    <div class="cart">
        <h2>Корзина</h2>
        <div id="cart"></div>
    </div>
    <script src="app.js"></script>
</body>
</html>
